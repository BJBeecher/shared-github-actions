name: Tag GHCR Image

on:
  workflow_call:
    inputs:
      service:
        description: Image/service name suffix
        required: true
        type: string
      source_tag:
        description: Existing image tag to copy from
        required: false
        default: ""
        type: string
      target_tags:
        description: Newline-separated image tags to create
        required: true
        type: string
    secrets:
      GH_TOKEN:
        required: true

jobs:
  tag-image:
    runs-on: [self-hosted, docker]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Retag image
        env:
          SERVICE: ${{ inputs.service }}
          SOURCE_TAG: ${{ inputs.source_tag }}
          TARGET_TAGS: ${{ inputs.target_tags }}
        run: |
          set -euo pipefail

          if [ -z "${SOURCE_TAG}" ]; then
            SOURCE_TAG="${GITHUB_SHA}"
          fi

          image_repository="ghcr.io/${GITHUB_REPOSITORY}/${SERVICE}"
          image_repository="$(printf '%s' "${image_repository}" | tr '[:upper:]' '[:lower:]')"
          source_image="${image_repository}:${SOURCE_TAG}"

          docker buildx imagetools inspect "${source_image}" >/dev/null

          tag_args=()
          while IFS= read -r target_tag; do
            if [ -z "${target_tag}" ]; then
              continue
            fi
            tag_args+=(--tag "${image_repository}:${target_tag}")
          done <<EOF
          ${TARGET_TAGS}
          EOF

          if [ "${#tag_args[@]}" -eq 0 ]; then
            echo "target_tags must include at least one tag" >&2
            exit 1
          fi

          docker buildx imagetools create \
            "${tag_args[@]}" \
            "${source_image}"
