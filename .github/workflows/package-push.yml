name: Package and Push to GHCR

on:
  workflow_call:
    inputs:
      dockerfile:
        description: Path to Dockerfile
        required: true
        type: string
      service:
        description: Image/service name suffix
        required: true
        type: string
      version:
        description: Optional additional image tag, such as a release version
        required: false
        default: ""
        type: string
      context:
        description: Docker build context
        required: false
        default: "."
        type: string
      platforms:
        description: Docker target platforms
        required: false
        default: linux/amd64
        type: string
    secrets:
      GH_TOKEN:
        required: true
      KEYCHAIN_PASSWORD:
        required: true

jobs:
  package:
    runs-on: [self-hosted, build-server, docker]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Unlock keychain
        run: security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Set lowercase repository name
        id: repo
        run: echo "repo=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: image-tags
        run: |
          {
            echo 'tags<<EOF'
            echo "ghcr.io/${{ steps.repo.outputs.repo }}/${{ inputs.service }}:latest"
            echo "ghcr.io/${{ steps.repo.outputs.repo }}/${{ inputs.service }}:${{ github.sha }}"
            if [ -n "${{ inputs.version }}" ]; then
              echo "ghcr.io/${{ steps.repo.outputs.repo }}/${{ inputs.service }}:${{ inputs.version }}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: ${{ inputs.platforms }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          tags: ${{ steps.image-tags.outputs.tags }}
